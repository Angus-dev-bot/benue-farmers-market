<!DOCTYPE html>
<html>
<head>
    <title>Shop - Benue Farmers Market</title>
    <style>
        body { font-family: Arial; background: #f1f1f1; margin: 0; }
        nav { background: #2d6a2d; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; }
        h1 { color: #2d6a2d; text-align: center; }
    </style>
</head>
<body>

    <div>
  <h3>Fresh Yam</h3>
  <p>₦3000</p>
  <button onclick="addToBasket('Fresh Yam', 3000)">Add to Basket</button>
</div>
<nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
</nav>

<div class="container">
    <h1>All Products</h1>
    <p style="text-align: center;">This is your full shop page. Copy all your products here from index.html</p>
</div>
<!-- FLOATING CART BUTTON -->
<button onclick="showCart()" style="background:#ff9900; color:white; padding:15px 25px; border:none; border-radius:50px; position:fixed; bottom:20px; right:20px; font-size:18px; cursor:pointer; z-index:999;">
  🛒 Basket (<span id="cart-count">0</span>)
</button>

<!-- CART POPUP -->
<div id="cart-popup" style="display:none; position:fixed; top:50px; right:20px; background:white; padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:1000; width:320px; color:black;">
  <h3>Your Basket</h3>
  <div id="cart-items"></div>
  <p><b>Total: ₦<span id="cart-total">0</span></b></p>
  <button onclick="sendOrder()" style="background:green; color:white; padding:10px; width:100%; border:none; border-radius:5px;">Send Order</button>
  <button onclick="document.getElementById('cart-popup').style.display='none'" style="margin-top:5px; background:gray; color:white; padding:10px; width:100%; border:none; border-radius:5px;">Close</button>
</div>

<script>
let cart = [];
const API_URL = 'https://4ll1adfgui.execute-api.us-east-2.amazonaws.com/prod/order';

function showCart() {
  document.getElementById('cart-popup').style.display='block';
  updateCart();
}

function addToBasket(name, price) {
  let item = cart.find(i => i.name === name);
  if(item) item.qty++;
  else cart.push({name, price, qty: 1});
  updateCart();
  alert(name + " added to basket!");
}

function updateCart() {
  let itemsDiv = document.getElementById('cart-items');
  let total = 0;
  itemsDiv.innerHTML = '';
  cart.forEach((item, index) => {
    total += item.price * item.qty;
    itemsDiv.innerHTML += `<p>${item.name} - ₦${item.price} x ${item.qty} <button onclick="removeItem(${index})">X</button></p>`;
  });
  document.getElementById('cart-total').innerText = total;
  document.getElementById('cart-count').innerText = cart.reduce((sum,i)=>sum+i.qty,0);
}

function removeItem(index) { cart.splice(index, 1); updateCart(); }

function sendOrder() {
  if(cart.length === 0) { alert("Basket is empty!"); return; }
  let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
  let orderData = {orderId: 'ORDER-' + Date.now(), customerName: "Website Customer", customerPhone: "N/A", items: cart, total: total, timestamp: new Date().toISOString()};

  fetch(API_URL, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(orderData)})
  .then(res => res.json())
  .then(result => {alert("✅ Order sent! ID: " + result.orderId); cart = []; updateCart(); document.getElementById('cart-popup').style.display='none';})
  .catch(err => alert("❌ Error: " + err.message));
}
</script>
</body>
</html>
