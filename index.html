<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benue Farmers Market</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5fff5; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #2d6a2d; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
    .card h3 { margin: 10px 0 5px; color: #333; }
  </style>
</head>
<body>
  <h1>🌾 Benue Farmers Market 🌽</h1>
  <p style="text-align:center;">Fresh produce from Benue State</p>
  
  <div class="grid">
    <div class="card"><img src="yam.jpg"><h3>Yam</h3></div>
    <div class="card"><img src="tomatoes.jpg"><h3>Tomatoes</h3></div>
    <div class="card"><img src="rice.jpg"><h3>Rice</h3></div>
    <div class="card"><img src="corn.jpg"><h3>Corn</h3></div>
    <div class="card"><img src="pepper.jpg"><h3>Pepper</h3></div>
    <div class="card"><img src="groundnut.jpg"><h3>Groundnut</h3></div>
    <div class="card"><img src="fish.jpg"><h3>Dry Fish</h3></div>
    <div class="card"><img src="oranges.jpg"><h3>Oranges</h3></div>
  </div>
</body>
</html>
