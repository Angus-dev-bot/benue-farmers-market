<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benue Farmers Market - Fresh Produce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
    
    body { background: #0a0a0a; color: white; }

    /* NAV - BLACK LIKE MEANDBODY */
    nav {
      background: #000;
      color: white;
      padding: 20px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .logo { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
    .menu-icon { font-size: 24px; cursor: pointer; }
    nav .links { display: none; }

    /* HERO - BIG TEXT + GOLD BUTTONS */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('corn.jpg') center/cover;
      text-align: center;
      padding: 80px 20px;
    }
    .hero h1 { 
      font-size: 36px; 
      line-height: 1.3; 
      margin-bottom: 15px;
    }
    .hero h1 span { color: #D4AF37; } /* GOLD COLOR */
    .hero p { font-size: 16px; color: #ccc; margin-bottom: 30px; }
    
    .btn-gold {
      background: #D4AF37;
      color: #000;
      padding: 16px 30px;
      border: none;
      width: 90%;
      max-width: 300px;
      border-radius: 4px;
      margin: 10px auto;
      display: block;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .btn-outline {
      background: transparent;
      color: #D4AF37;
      border: 2px solid #D4AF37;
      padding: 14px 30px;
      width: 90%;
      max-width: 300px;
      border-radius: 4px;
      margin: 10px auto;
      display: block;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
    }

    /* PRODUCTS - WHITE CARDS ON GREEN */
    .products {
      background: white;
      padding: 50px 5%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }
    .card {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      color: #000;
    }
    .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
    .card h3 { margin: 15px 0 5px; font-size: 20px; }
    .price { color: #2E7D32; font-size: 20px; font-weight: bold; }
    .btn-green {
      background: #2E7D32;
      color: white;
      padding: 14px;
      border: none;
      width: 100%;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .products { grid-template-columns: repeat(3, 1fr); }
      .hero h1 { font-size: 55px; }
      nav .links { display: flex; }
      nav .links a { color: white; margin-left: 25px; text-decoration: none; }
      .menu-icon { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">BENUE FARMERS MARKET</div>
    <div class="menu-icon">☰</div>
    <div class="links">
      <a href="index.html">HOME</a>
      <a href="shop.html">SHOP</a>
      <a href="about.html">ABOUT</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Fresh Produce.<br><span>Grown in Benue.</span><br>Delivered to You.</h1>
    <p>Farm to table. 100% Natural. Same day delivery across Nigeria.</p>
    <button class="btn-gold" onclick="window.location='shop.html'">SHOP BEST SELLERS</button>
    <button class="btn-outline" onclick="window.open('https://wa.me/2348148170728')">ORDER ON WHATSAPP</button>
  </section>

  <section class="products">
    <div class="card">
      <img src="yam.jpg" alt="Yam">
      <h3>Fresh Yam</h3>
      <p class="price">₦1,500 / tuber</p>
      <button class="btn-green" onclick="window.open('https://wa.me/2348148170728')">Order on WhatsApp</button>
    </div>
    <div class="card">
      <img src="corn.jpg" alt="Corn">
      <h3>White Corn</h3>
      <p class="price">₦25,000 / bag</p>
      <button class="btn-green" onclick="window.open('https://wa.me/2348148170728')">Order on WhatsApp</button>
    </div>
    <div class="card">
      <img src="rice.jpg" alt="Rice">
      <h3>Benue Rice</h3>
      <p class="price">₦45,000 / bag</p>
      <button class="btn-green" onclick="window.open('https://wa.me/2348148170728')">Order on WhatsApp</button>
    </div>
  </section>

</body>
</html>
