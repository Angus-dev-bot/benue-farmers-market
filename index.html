<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benue Farmers Market - Fresh Produce from Benue State</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    
    nav {
      background: #2E7D32;
      color: white;
      padding: 15px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .logo { font-size: 18px; font-weight: bold; }
    .menu-icon { font-size: 24px; cursor: pointer; }
    nav input { display: none; width: 40%; padding: 8px; border-radius: 5px; border: none; }
    nav .links { display: none; }
    nav .links a { color: white; margin-left: 20px; text-decoration: none; }

    .hero {
      background: #2E7D32;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    .hero h1 { font-size: 32px; margin-bottom: 10px; }

    .products {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 30px 5%;
    }

    @media (min-width: 600px) {
      .products { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      .products { grid-template-columns: repeat(3, 1fr); }
      nav .links { display: flex; }
      nav input { display: block; }
      .menu-icon { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">🌾 Benue Farmers Market</div>
    <div class="menu-icon">☰</div>
    <input type="search" placeholder="Search for yam, corn, pepper...">
    <div class="links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="https://wa.me/2348148170728">WhatsApp</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Fresh Produce from Benue State</h1>
    <p>Yam, Corn, Pepper direct from Farmers to You</p>
  </section>

  <section class="products">
    <h2 style="text-align:center; grid-column: 1/-1;">Welcome to Benue Farmers Market</h2>
  </section>

</body>
</html>
