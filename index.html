<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benue Farmers Market - Fresh from the Farm</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f5f5f5; }
  
  /* JUMIA HEADER */
  nav { background: #2d5016; padding: 12px 0; color: white; position: sticky; top: 0; z-index: 100; }
  .nav-container { max-width: 1200px; margin: auto; display: flex; align-items: center; gap: 20px; padding: 0 15px; }
  .logo { font-size: 22px; font-weight: bold; }
  .search-bar { flex: 1; padding: 10px; border-radius: 5px; border: none; }
  .nav-links a { color: white; text-decoration: none; margin-left: 15px; }
  
  /* JUMIA LAYOUT */
  .container { max-width: 1200px; margin: 20px auto; display: flex; gap: 15px; padding: 0 15px; }
  .sidebar { width: 220px; background: white; padding: 15px; border-radius: 5px; }
  .sidebar h3 { margin-bottom: 10px; color: #2d5016; }
  .sidebar p { padding: 8px 0; cursor: pointer; }
  .sidebar p:hover { color: #ff6600; }
  
  .banner { flex: 1; background: linear-gradient(135deg, #ff6600, #2d5016); color: white; padding: 50px; border-radius: 5px; text-align: center; }
  .banner button { padding: 12px 30px; background: white; color: #2d5016; border: none; border-radius: 5px; font-weight: bold; margin-top: 15px; cursor: pointer; }
  
  /* JUMIA PRODUCTS */
  .products-section { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
  .product-card { background: white; padding: 15px; border-radius: 5px; text-align: center; }
  .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
  .price { color: #2d5016; font-size: 18px; font-weight: bold; margin: 10px 0; }
  .btn-whatsapp { background: #25D366; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
  
  @media (max-width: 900px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; }
  }
</style>
</head>
<body>

<!-- JUMIA NAV -->
<nav>
  <div class="nav-container">
    <div class="logo">🌾 Benue Market</div>
    <input class="search-bar" type="text" placeholder="Search for yam, rice, tomatoes...">
    <div class="nav-links">
      <a href="https://wa.me/234XXXXXXXXXX">📱 WhatsApp</a>
      <a href="#cart">🛒 Cart</a>
    </div>
  </div>
</nav>

<!-- JUMIA CATEGORIES + BANNER -->
<div class="container">
  <div class="sidebar">
    <h3>Categories</h3>
    <p>🌾 Grains</p>
    <p>🥔 Tubers</p>
    <p>🥬 Vegetables</p>
    <p>🍎 Fruits</p>
    <p>🐓 Livestock</p>
  </div>
  
  <div class="banner">
    <h1>FRESH FROM BENUE FARMERS</h1>
    <p>Direct from farm to your door. Best prices guaranteed!</p>
    <button>Shop Now</button>
  </div>
</div>

<!-- JUMIA PRODUCTS -->
<div class="products-section">
  <h2 style="margin-bottom: 15px;">Featured Products</h2>
  <div class="products-grid">
    
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=400" alt="Yam">
      <h3>fresh fruits</h3>
      <p class="price">₦2,500 per kg</p>
      <button class="btn-whatsapp" onclick="window.open('https://wa.me/2348148170728?text=I want to order Fresh Yam')">Order on WhatsApp</button>
    </div>
    
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1589923188651-268a9765e432?w=400" alt="Rice">
      <h3>livestock</h3>
      <p class="price">₦7,000 above</p>
      <button class="btn-whatsapp" onclick="window.open('https://wa.me/2348148170738?text=I want to order Benue Rice')">Order on WhatsApp</button>
    </div>
    
  </div>
</div>

</body>
</html>
